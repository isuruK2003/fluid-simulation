<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FFS</title>
  </head>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    .flex-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
  </style>
  <body>
    <div class="flex-container" style="background-color: #333">
      <canvas id="canvas"></canvas>
    </div>
    <script>
      /**
       * Represents a 2D grid with a boundary layer for fluid simulation.
       * The grid stores named float fields (velocity components, density, etc.)
       * and provides index arithmetic that accounts for the boundary padding.
       */
      class Grid {
        /**
         * @param {number} width - Number of interior cells along each axis.
         * @param {number} [boundary=1] - Thickness of the boundary layer on each side.
         */
        constructor(width, boundary = 1) {
          this.width = width;
          this.boundary = boundary;
          this.fields = {
            vy: new Float32Array(this.getSize()),
            vx: new Float32Array(this.getSize()),
            vyPrev: new Float32Array(this.getSize()),
            vxPrev: new Float32Array(this.getSize()),
            densPrev: new Float32Array(this.getSize()),
            dens: new Float32Array(this.getSize()),
          };
        }

        /**
         * Total number of cells including boundary padding on all sides.
         * @returns {number}
         */
        getSize = () => (this.width + 2 * this.boundary) ** 2;

        /**
         * Converts a 2D grid coordinate to a flat array index.
         * @param {number} x - Column index (0 = left boundary).
         * @param {number} y - Row index (0 = top boundary).
         * @returns {number}
         */
        getIndex = (x, y) => x + (this.width + 2 * this.boundary) * y;

        /**
         * Returns the flat Float32Array for a named field.
         * @param {string} fieldName - One of the keys in {@link Grid#fields}.
         * @returns {Float32Array}
         */
        getField = (fieldName) => this.fields[fieldName];

        /**
         * Swaps two named fields in place by exchanging their Float32Array references.
         * @param {string} fieldNameA - First field name.
         * @param {string} fieldNameB - Second field name.
         */
        swapFields(fieldNameA, fieldNameB) {
          [this.fields[fieldNameA], this.fields[fieldNameB]] = [
            this.fields[fieldNameB],
            this.fields[fieldNameA],
          ];
        }

        /**
         * Zeroes every field, effectively resetting the simulation state.
         */
        reset() {
          for (const field of Object.values(this.fields)) field.fill(0);
        }
      }

      /**
       * Implements the Jos Stam "Stable Fluids" solver (1999) operating on a {@link Grid}.
       * Each simulation step consists of a velocity step followed by a density step.
       */
      class Solver {
        /**
         * @param {Grid} grid - The grid this solver operates on.
         */
        constructor(grid) {
          this.grid = grid;
        }

        /**
         * Adds a source field scaled by dt into a target field.
         * Implements the "add source" step: x += dt * s.
         * @param {string} fieldName - Target field to accumulate into.
         * @param {Float32Array} source - Source values to add.
         * @param {number} dt - Timestep in seconds.
         */
        addSource(fieldName, source, dt) {
          const field = this.grid.fields[fieldName];
          for (let i = 0; i < this.grid.getSize(); i++) {
            field[i] += dt * source[i];
          }
        }

        /**
         * Enforces boundary conditions on a field by mirroring or copying edge values.
         * - 0: copies edge values (used for scalar fields like density and pressure).
         * - 1: negates vx at left/right walls (reflects horizontal velocity).
         * - 2: negates vy at top/bottom walls (reflects vertical velocity).
         * Corner cells are set to the average of their two neighbours.
         * @param {number} b - Negation mode: 0, 1, or 2.
         * @param {Float32Array} field - The field to apply boundary conditions to.
         */
        setBoundary(b, field) {
          for (let i = 1; i <= this.grid.width; i++) {
            field[this.grid.getIndex(0, i)] =
              b === 1
                ? -field[this.grid.getIndex(1, i)]
                : field[this.grid.getIndex(1, i)];
            field[this.grid.getIndex(this.grid.width + 1, i)] =
              b === 1
                ? -field[this.grid.getIndex(this.grid.width, i)]
                : field[this.grid.getIndex(this.grid.width, i)];
            field[this.grid.getIndex(i, 0)] =
              b === 2
                ? -field[this.grid.getIndex(i, 1)]
                : field[this.grid.getIndex(i, 1)];
            field[this.grid.getIndex(i, this.grid.width + 1)] =
              b === 2
                ? -field[this.grid.getIndex(i, this.grid.width)]
                : field[this.grid.getIndex(i, this.grid.width)];
          }
          field[this.grid.getIndex(0, 0)] =
            0.5 *
            (field[this.grid.getIndex(1, 0)] + field[this.grid.getIndex(0, 1)]);
          field[this.grid.getIndex(0, this.grid.width + 1)] =
            0.5 *
            (field[this.grid.getIndex(1, this.grid.width + 1)] +
              field[this.grid.getIndex(0, this.grid.width)]);
          field[this.grid.getIndex(this.grid.width + 1, 0)] =
            0.5 *
            (field[this.grid.getIndex(this.grid.width, 0)] +
              field[this.grid.getIndex(this.grid.width + 1, 1)]);
          field[this.grid.getIndex(this.grid.width + 1, this.grid.width + 1)] =
            0.5 *
            (field[this.grid.getIndex(this.grid.width, this.grid.width + 1)] +
              field[this.grid.getIndex(this.grid.width + 1, this.grid.width)]);
        }

        /**
         * Solves a linear system iteratively using Gauss-Seidel relaxation.
         * Used internally by {@link Solver#diffuse} and {@link Solver#project}.
         * Runs 20 iterations, which is enough for stable convergence at typical grid sizes.
         * @param {number} b - Negation mode passed through to {@link Solver#setBoundary}.
         * @param {Float32Array} field - The field being solved for (modified in place).
         * @param {Float32Array} field0 - The field from the previous timestep (right-hand side).
         * @param {number} a - Diffusion coefficient scaled by dt and grid size.
         * @param {number} c - Diagonal coefficient (1 + 4*a for diffusion, 4 for pressure).
         */
        linSolve(b, field, field0, diffusionCoefficient, diagonalCoefficient) {
          for (let k = 0; k < 20; k++) {
            for (let i = 1; i <= this.grid.width; i++) {
              for (let j = 1; j <= this.grid.width; j++) {
                const left = field[this.grid.getIndex(i - 1, j)];
                const right = field[this.grid.getIndex(i + 1, j)];
                const top = field[this.grid.getIndex(i, j - 1)];
                const bottom = field[this.grid.getIndex(i, j + 1)];
                const neighbours = left + right + top + bottom;
                field[this.grid.getIndex(i, j)] =
                  (field0[this.grid.getIndex(i, j)] +
                    diffusionCoefficient * neighbours) *
                  (1 / diagonalCoefficient);
              }
            }
            this.setBoundary(b, field);
          }
        }

        /**
         * Diffuses a field by solving the implicit diffusion equation via {@link Solver#linSolve}.
         * Implicit integration makes the step unconditionally stable for any dt.
         * @param {number} b - Negation mode passed through to {@link Solver#setBoundary}.
         * @param {string} fieldName - Target field to diffuse into.
         * @param {string} fieldPrevName - Source field from the previous timestep.
         * @param {number} diff - Diffusion rate coefficient.
         * @param {number} dt - Timestep in seconds.
         */
        diffuse(b, fieldName, fieldPrevName, diff, dt) {
          const a = dt * diff * this.grid.width * this.grid.width;
          this.linSolve(
            b,
            this.grid.fields[fieldName],
            this.grid.fields[fieldPrevName],
            a,
            1 + 4 * a,
          );
        }

        /**
         * Moves a field along the current velocity field using semi-Lagrangian advection.
         * For each cell, traces a particle backward in time and interpolates the previous
         * field value at that position using bilinear interpolation.
         * @param {number} b - Negation mode passed through to {@link Solver#setBoundary}.
         * @param {string} fieldName - Target field to advect into.
         * @param {string} fieldPrevName - Source field from the previous timestep.
         * @param {string} vxName - Field name for the x-component of velocity.
         * @param {string} vyName - Field name for the y-component of velocity.
         * @param {number} dt - Timestep in seconds.
         */
        advect(b, fieldName, fieldPrevName, vxName, vyName, dt) {
          const dt0 = dt * this.grid.width;

          for (let i = 1; i <= this.grid.width; i++) {
            for (let j = 1; j <= this.grid.width; j++) {
              let traceX =
                i - dt0 * this.grid.fields[vxName][this.grid.getIndex(i, j)];
              let traceY =
                j - dt0 * this.grid.fields[vyName][this.grid.getIndex(i, j)];

              if (traceX < 0.5) traceX = 0.5;
              if (traceX > this.grid.width + 0.5)
                traceX = this.grid.width + 0.5;
              if (traceY < 0.5) traceY = 0.5;
              if (traceY > this.grid.width + 0.5)
                traceY = this.grid.width + 0.5;

              const left = Math.floor(traceX);
              const right = left + 1;
              const top = Math.floor(traceY);
              const bottom = top + 1;

              const rightWeight = traceX - left;
              const leftWeight = 1 - rightWeight;
              const bottomWeight = traceY - top;
              const topWeight = 1 - bottomWeight;

              const topLeft =
                this.grid.fields[fieldPrevName][this.grid.getIndex(left, top)];
              const bottomLeft =
                this.grid.fields[fieldPrevName][
                  this.grid.getIndex(left, bottom)
                ];
              const topRight =
                this.grid.fields[fieldPrevName][this.grid.getIndex(right, top)];
              const bottomRight =
                this.grid.fields[fieldPrevName][
                  this.grid.getIndex(right, bottom)
                ];
              this.grid.fields[fieldName][this.grid.getIndex(i, j)] =
                leftWeight * (topWeight * topLeft + bottomWeight * bottomLeft) +
                rightWeight *
                  (topWeight * topRight + bottomWeight * bottomRight);
            }
          }
          this.setBoundary(b, this.grid.fields[fieldName]);
        }

        /**
         * Projects the velocity field onto its divergence-free component.
         * This enforces the incompressibility constraint (mass conservation) by computing
         * a pressure field that corrects any spurious divergence in vx and vy.
         * Uses vxPrev as scratch space for pressure and vyPrev for divergence.
         */
        project() {
          const cellSize = 1 / this.grid.width;

          for (let i = 1; i <= this.grid.width; i++) {
            for (let j = 1; j <= this.grid.width; j++) {
              const vxDivergence =
                this.grid.fields.vx[this.grid.getIndex(i + 1, j)] -
                this.grid.fields.vx[this.grid.getIndex(i - 1, j)];
              const vyDivergence =
                this.grid.fields.vy[this.grid.getIndex(i, j + 1)] -
                this.grid.fields.vy[this.grid.getIndex(i, j - 1)];
              this.grid.fields.vyPrev[this.grid.getIndex(i, j)] =
                -0.5 * cellSize * (vxDivergence + vyDivergence);
              this.grid.fields.vxPrev[this.grid.getIndex(i, j)] = 0;
            }
          }
          this.setBoundary(0, this.grid.fields.vyPrev);
          this.setBoundary(0, this.grid.fields.vxPrev);
          this.linSolve(
            0,
            this.grid.fields.vxPrev,
            this.grid.fields.vyPrev,
            1,
            4,
          );

          for (let i = 1; i <= this.grid.width; i++) {
            for (let j = 1; j <= this.grid.width; j++) {
              this.grid.fields.vx[this.grid.getIndex(i, j)] -=
                (0.5 *
                  (this.grid.fields.vxPrev[this.grid.getIndex(i + 1, j)] -
                    this.grid.fields.vxPrev[this.grid.getIndex(i - 1, j)])) /
                cellSize;
              this.grid.fields.vy[this.grid.getIndex(i, j)] -=
                (0.5 *
                  (this.grid.fields.vxPrev[this.grid.getIndex(i, j + 1)] -
                    this.grid.fields.vxPrev[this.grid.getIndex(i, j - 1)])) /
                cellSize;
            }
          }
          this.setBoundary(1, this.grid.fields.vx);
          this.setBoundary(2, this.grid.fields.vy);
        }

        /**
         * Advances the velocity field by one timestep.
         * Pipeline: add external forces → diffuse → project → advect → project.
         * The double project ensures the field is divergence-free both before and after advection.
         * @param {number} dt - Timestep in seconds.
         * @param {number} viscosity - Kinematic viscosity coefficient.
         */
        velStep(dt, viscosity) {
          this.addSource("vx", this.grid.fields.vxPrev, dt);
          this.addSource("vy", this.grid.fields.vyPrev, dt);

          this.grid.swapFields("vx", "vxPrev");
          this.diffuse(1, "vx", "vxPrev", viscosity, dt);

          this.grid.swapFields("vy", "vyPrev");
          this.diffuse(2, "vy", "vyPrev", viscosity, dt);

          this.project();

          this.grid.swapFields("vx", "vxPrev");
          this.grid.swapFields("vy", "vyPrev");
          this.advect(1, "vx", "vxPrev", "vxPrev", "vyPrev", dt);
          this.advect(2, "vy", "vyPrev", "vxPrev", "vyPrev", dt);

          this.project();
        }

        /**
         * Advances the density field by one timestep.
         * Pipeline: add sources → diffuse → advect.
         * @param {number} dt - Timestep in seconds.
         * @param {number} diffusion - Diffusion rate coefficient for density spreading.
         */
        densStep(dt, diffusion) {
          this.addSource("dens", this.grid.fields.densPrev, dt);

          this.grid.swapFields("dens", "densPrev");
          this.diffuse(0, "dens", "densPrev", diffusion, dt);

          this.grid.swapFields("dens", "densPrev");
          this.advect(0, "dens", "densPrev", "vx", "vy", dt);
        }
      }

      class Renderer {
        constructor(canvas, grid, solver, options = {}) {
          this.canvas = canvas;
          this.ctx = canvas.getContext("2d");
          this.grid = grid;
          this.solver = solver;

          this.cellSize = options.cellSize ?? 5;
          this.dt = options.dt ?? 0.1;
          this.diffusion = options.diffusion ?? 0.00001;
          this.viscosity = options.viscosity ?? 0.00001;
          this.fadeRate = options.fadeRate ?? 0.995;

          this.canvas.width = this.grid.width * this.cellSize;
          this.canvas.height = this.grid.width * this.cellSize;

          this.nozzle = {
            x: options.nozzle?.x ?? 8,
            y: options.nozzle?.y ?? Math.floor(this.grid.width / 2),
            vx: options.nozzle?.vx ?? 30,
            vy: options.nozzle?.vy ?? 0,
            density: options.nozzle?.density ?? 2000,
            radius: options.nozzle?.radius ?? 2,
          };
        }

        clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        addDensity(x, y, amount) {
          this.grid.fields.densPrev[this.grid.getIndex(x, y)] += amount;
        }

        addVelocity(x, y, vx, vy) {
          const index = this.grid.getIndex(x, y);
          this.grid.fields.vxPrev[index] += vx;
          this.grid.fields.vyPrev[index] += vy;
        }

        clearPrevFields() {
          this.grid.fields.densPrev.fill(0);
          this.grid.fields.vxPrev.fill(0);
          this.grid.fields.vyPrev.fill(0);
        }

        fadeDensity() {
          const dens = this.grid.fields.dens;
          for (let i = 0; i < dens.length; i++) {
            dens[i] *= this.fadeRate;
          }
        }

        injectNozzle() {
          const { x, y, vx, vy, density, radius } = this.nozzle;

          for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
              const px = x + dx;
              const py = y + dy;

              if (
                px < 1 ||
                px > this.grid.width ||
                py < 1 ||
                py > this.grid.width
              ) {
                continue;
              }

              this.addDensity(px, py, density * this.dt);
              this.addVelocity(px, py, vx * this.dt, vy * this.dt);
            }
          }
        }

        renderDensity() {
          this.ctx.fillStyle = "black";
          this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

          for (let y = 1; y <= this.grid.width; y++) {
            for (let x = 1; x <= this.grid.width; x++) {
              const density = this.grid.fields.dens[this.grid.getIndex(x, y)];
              const value = this.clamp(density, 0, 255);

              if (value <= 0.5) continue;

              this.ctx.fillStyle = `rgb(${value}, ${value}, ${value})`;
              this.ctx.fillRect(
                (x - 1) * this.cellSize,
                (y - 1) * this.cellSize,
                this.cellSize,
                this.cellSize,
              );
            }
          }
        }

        renderNozzle() {
          this.ctx.fillStyle = "red";
          this.ctx.fillRect(
            (this.nozzle.x - 1) * this.cellSize,
            (this.nozzle.y - 1) * this.cellSize,
            this.cellSize * 2,
            this.cellSize * 2,
          );
        }

        step = () => {
          this.injectNozzle();

          this.solver.velStep(this.dt, this.viscosity);
          this.solver.densStep(this.dt, this.diffusion);

          this.fadeDensity();
          this.renderDensity();
          this.renderNozzle();
          this.clearPrevFields();

          requestAnimationFrame(this.step);
        };

        start() {
          this.step();
        }
      }

      function main() {
        const DEFAULT_CELL_SIZE = 4;
        const GRID_WIDTH = Math.floor(720 / DEFAULT_CELL_SIZE);

        const canvas = document.getElementById("canvas");
        const grid = new Grid(GRID_WIDTH, 1);
        const solver = new Solver(grid);

        const renderer = new Renderer(canvas, grid, solver, {
          cellSize: DEFAULT_CELL_SIZE,
          dt: 0.1,
          viscosity: 0.00001,
          diffusion: 0.000000001,
          fadeRate: 0.997,
          nozzle: {
            x: 8,
            y: Math.floor(grid.width / 2),
            vx: 70,
            vy: 0,
            density: 40000,
            radius: 2,
          },
        });

        let isMouseDown = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        canvas.addEventListener("mousedown", (event) => {
          isMouseDown = true;
          updateNozzlePosition(event);
          lastMouseX = event.clientX;
          lastMouseY = event.clientY;
        });

        canvas.addEventListener("mousemove", (event) => {
          if (!isMouseDown) return;
          updateNozzlePosition(event);
        });

        window.addEventListener("mouseup", () => {
          isMouseDown = false;
        });

        function updateNozzlePosition(event) {
          const rect = canvas.getBoundingClientRect();

          const x =
            Math.floor((event.clientX - rect.left) / renderer.cellSize) + 1;
          const y =
            Math.floor((event.clientY - rect.top) / renderer.cellSize) + 1;

          renderer.nozzle.x = Math.max(1, Math.min(renderer.grid.width, x));
          renderer.nozzle.y = Math.max(1, Math.min(renderer.grid.width, y));

          const dx = event.clientX - lastMouseX;
          const dy = event.clientY - lastMouseY;

          renderer.nozzle.vx = dx * 2;
          renderer.nozzle.vy = dy * 2;

          lastMouseX = event.clientX;
          lastMouseY = event.clientY;
        }

        renderer.start();
      }

      document.addEventListener("DOMContentLoaded", main);
    </script>
  </body>
</html>
